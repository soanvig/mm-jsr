<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./node_modules/mm-jsr/styles.css" />
    <title>JSR</title>
  </head>
  <body style="height: 120vh">
    <div id="app"></div>
    <script type="importmap">
      {
        "imports": {
          "mm-jsr": "./node_modules/mm-jsr/build/index.js",
          "react": "https://esm.sh/react@19.2.7/?dev",
          "react-dom/client": "https://esm.sh/react-dom@19.2.7/client/?dev"
        }
      }
    </script>
    <script type="module">
      import { useJSR } from './build/index.js';
      import * as JSR from 'mm-jsr';
      import * as React from 'react';
      import * as ReactDOM from 'react-dom/client';

      const toggleButton = (instance) => {
        const clickHandler = () => {
          if (instance.isEnabled()) {
            instance.disable();
          } else {
            instance.enable();
          }
        };
        return React.createElement('button', { onClick: clickHandler }, 'toggle');
      };

      const jsrApp = React.createElement(
        () => {
          const { ref: jsrRef, instance } = useJSR({
            modules: [
              new JSR.ModuleRail(),
              new JSR.ModuleSlider(),
              new JSR.ModuleBar(),
              new JSR.ModuleLabel(),
            ],
            config: {
              min: 0,
              max: 100,
              step: 1,
              initialValues: [25, 75],
            },
          });

          React.useEffect(() => {
            if (instance) {
              return instance.onValueChange(console.log);
            }
          }, [instance]);

          return React.createElement(
            React.Fragment,
            null,
            toggleButton(instance),
            React.createElement('div', { ref: jsrRef }, null),
          );
        },
        null,
        null,
      );

      const root = ReactDOM.createRoot(document.querySelector('#app'));
      root.render(jsrApp);
    </script>
  </body>
</html>
