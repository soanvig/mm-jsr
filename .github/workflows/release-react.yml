name: Version and release react-mm-jsr

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version of release'
        required: true

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - run: pnpm install
      - run: pnpm build
      - run: pnpm -F react-mm-jsr test
  release:
    needs: unit-tests
    if: ${{ github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - run: pnpm install
      - run: pnpm build
      - run: git config --global user.email "actions@github.com"
      - run: git config --global user.name "GH Actions"
      - run: pnpm version --new-version ${{ github.event.inputs.version }} --no-git-tag-version
        working-directory: ./packages/react-mm-jsr
      - run: git commit -a -m "[react-mm-jsr] v${{ github.event.inputs.version }}"
      - run: npm publish --no-git-checks   # we copied readme so need to disable check - we do not want to commit README though
        working-directory: ./packages/react-mm-jsr
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
          tags: true
