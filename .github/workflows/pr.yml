name: Test pull request

on:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - run: pnpm install
      - run: pnpm build
      - run: pnpm test
  lib-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - run: pnpm install
      - run: pnpm build
      - run: pnpm -F mm-jsr size-limit
